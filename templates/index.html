<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classification des Genres Musicaux</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            background: #f5f5f5;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
        }

        .upload-box {
            background: white;
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .upload-box:hover {
            border-color: #3498db;
            background: #f8fbff;
        }

        .upload-box input {
            display: none;
        }

        .upload-box p {
            font-size: 1.1rem;
            color: #666;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            display: block;
            margin: 0 auto 30px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .filename {
            margin-top: 10px;
            color: #3498db;
            font-weight: bold;
        }

        /* resultat */
        .result-box {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .result-box h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .genre-result {
            text-align: center;
            padding: 20px;
        }

        .genre-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            text-transform: uppercase;
        }

        .confidence {
            font-size: 1.2rem;
            color: #777;
            margin-top: 5px;
        }

        /* barres de probabilites */
        .prob-bar-container {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prob-label {
            width: 90px;
            text-align: right;
            font-size: 0.9rem;
            color: #555;
        }

        .prob-bar-bg {
            flex: 1;
            background: #eee;
            border-radius: 6px;
            height: 22px;
            overflow: hidden;
        }

        .prob-bar {
            height: 100%;
            background: #3498db;
            border-radius: 6px;
            transition: width 0.5s;
        }

        .prob-bar.top {
            background: #27ae60;
        }

        .prob-value {
            width: 50px;
            font-size: 0.85rem;
            color: #555;
        }

        /* images */
        .viz-img {
            width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 1.1rem;
            display: none;
        }

        .error {
            background: #fee;
            color: #c0392b;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        #results {
            display: none;
        }
    </style>
</head>

<body>
    <h1>Classification des Genres Musicaux</h1>
    <p class="subtitle">
        Uploadez un fichier audio pour predire son genre musical
    </p>

    <!-- upload -->
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p>Cliquez ici ou glissez un fichier audio</p>
        <p style="font-size: 0.85rem; color: #999">
            Formats : .wav, .mp3, .ogg, .flac
        </p>
        <input type="file" id="fileInput" accept=".wav,.mp3,.ogg,.flac" />
        <div class="filename" id="fileName"></div>
    </div>

    <button class="btn" id="predictBtn" disabled onclick="predict()">
        Classifier
    </button>

    <div class="loading" id="loading">Analyse en cours...</div>
    <div class="error" id="error"></div>

    <!-- resultats -->
    <div id="results">
        <div class="result-box">
            <div class="genre-result">
                <div class="genre-name" id="genreName"></div>
                <div class="confidence" id="confidence"></div>
                <div style="margin-top: 5px; color: #999; font-size: 0.9rem" id="fileInfo"></div>
            </div>
        </div>

        <div class="result-box">
            <h2>Probabilites par genre</h2>
            <div id="probBars"></div>
        </div>

        <div class="result-box">
            <h2>Forme d'onde</h2>
            <img class="viz-img" id="waveformImg" />
        </div>

        <div class="result-box">
            <h2>Spectrogramme Mel</h2>
            <img class="viz-img" id="spectrogramImg" />
        </div>

        <div class="result-box">
            <h2>MFCC</h2>
            <img class="viz-img" id="mfccImg" />
        </div>
    </div>

    <script>
        const fileInput = document.getElementById("fileInput");
        const predictBtn = document.getElementById("predictBtn");
        const fileName = document.getElementById("fileName");

        fileInput.addEventListener("change", function () {
            if (this.files.length > 0) {
                fileName.textContent = this.files[0].name;
                predictBtn.disabled = false;
            }
        });

        // drag & drop
        const uploadBox = document.querySelector(".upload-box");
        uploadBox.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadBox.style.borderColor = "#3498db";
        });
        uploadBox.addEventListener("dragleave", () => {
            uploadBox.style.borderColor = "#ccc";
        });
        uploadBox.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadBox.style.borderColor = "#ccc";
            fileInput.files = e.dataTransfer.files;
            fileInput.dispatchEvent(new Event("change"));
        });

        function predict() {
            const file = fileInput.files[0];
            if (!file) return;

            // afficher le chargement
            document.getElementById("loading").style.display = "block";
            document.getElementById("results").style.display = "none";
            document.getElementById("error").style.display = "none";
            predictBtn.disabled = true;

            const formData = new FormData();
            formData.append("file", file);

            fetch("/predict", { method: "POST", body: formData })
                .then((r) => r.json())
                .then((data) => {
                    document.getElementById("loading").style.display = "none";
                    predictBtn.disabled = false;

                    if (data.error) {
                        document.getElementById("error").textContent = data.error;
                        document.getElementById("error").style.display = "block";
                        return;
                    }

                    // afficher le resultat
                    document.getElementById("genreName").textContent = data.genre;
                    document.getElementById("confidence").textContent =
                        "Confiance : " + data.confidence + "%";
                    document.getElementById("fileInfo").textContent =
                        data.filename + " - " + data.duration + "s";

                    // barres de probabilites
                    let barsHtml = "";
                    data.probabilities.forEach((p, i) => {
                        const topClass = i === 0 ? "top" : "";
                        barsHtml += `
                            <div class="prob-bar-container">
                                <div class="prob-label">${p.genre}</div>
                                <div class="prob-bar-bg">
                                    <div class="prob-bar ${topClass}" style="width: ${p.probability}%"></div>
                                </div>
                                <div class="prob-value">${p.probability}%</div>
                            </div>`;
                    });
                    document.getElementById("probBars").innerHTML = barsHtml;

                    // images
                    document.getElementById("waveformImg").src =
                        "data:image/png;base64," + data.waveform_img;
                    document.getElementById("spectrogramImg").src =
                        "data:image/png;base64," + data.spectrogram_img;
                    document.getElementById("mfccImg").src =
                        "data:image/png;base64," + data.mfcc_img;

                    document.getElementById("results").style.display = "block";
                })
                .catch((err) => {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("error").textContent =
                        "Erreur: " + err.message;
                    document.getElementById("error").style.display = "block";
                    predictBtn.disabled = false;
                });
        }
    </script>
</body>

</html>
